<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Tagline lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: var(--paper); }
  .lockup { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lockup img { height: 38px; }
  .rule { width: 110px; border-top: 1px solid var(--ink); }
  .tag { font-family: var(--font-serif); font-style: italic; font-size: 17px; letter-spacing: 0.04em; color: var(--ink); }
  .meta { font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--fg-mute); }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo-wordmark.svg" alt="Meyakara">
    <div class="rule"></div>
    <div class="tag">The Shape of Your Escape.</div>
    <div class="meta">Est. 2026 · Born in India</div>
  </div>
</body>
</html>
