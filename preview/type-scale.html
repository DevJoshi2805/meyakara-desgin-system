<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 36px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-serif); }
  td { padding: 9px 0; border-bottom: 1px solid var(--rule-soft); vertical-align: baseline; }
  td.tag { width: 90px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mute); }
  td.size { width: 56px; font-size: 11px; color: var(--fg-faint); text-align: right; padding-right: 18px; }
  td.spec { color: var(--fg); }
</style>
</head>
<body>
<table>
  <tr><td class="tag">Display</td><td class="size">56</td><td class="spec" style="font-size:42px;line-height:1.05">Find the shape</td></tr>
  <tr><td class="tag">H1</td><td class="size">38</td><td class="spec" style="font-size:30px;line-height:1.1">The hills won't wait</td></tr>
  <tr><td class="tag">H2</td><td class="size">26</td><td class="spec" style="font-size:22px;line-height:1.2">A door, then a room</td></tr>
  <tr><td class="tag">H3</td><td class="size">22</td><td class="spec" style="font-size:18px">An unhurried afternoon</td></tr>
  <tr><td class="tag">Body</td><td class="size">17</td><td class="spec" style="font-size:15px;color:var(--fg-soft)">The escape is not a destination.</td></tr>
  <tr><td class="tag">Caption</td><td class="size">13</td><td class="spec" style="font-size:12px;color:var(--fg-mute)">Est. 2026 · Born in India</td></tr>
  <tr><td class="tag">Eyebrow</td><td class="size">11</td><td class="spec" style="font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg-mute)">02 — The Core Belief</td></tr>
</table>
</body>
</html>
