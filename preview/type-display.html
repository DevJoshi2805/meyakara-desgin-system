<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 36px; }
  .row { display: grid; grid-template-columns: 88px 1fr; align-items: baseline; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--rule-soft); }
  .row:last-child { border-bottom: 0; }
  .meta { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mute); }
  .specimen { font-family: var(--font-serif); }
  .display { font-size: 56px; line-height: 1.05; letter-spacing: -0.005em; }
  .h1 { font-size: 38px; line-height: 1.1; }
  .h2 { font-size: 26px; line-height: 1.2; }
</style>
</head>
<body>
  <div class="row"><div class="meta">Display 56</div><div class="specimen display">The Shape of Your Escape.</div></div>
  <div class="row"><div class="meta">H1 · 38</div><div class="specimen h1">Everyone has a hill. This is yours.</div></div>
  <div class="row"><div class="meta">H2 · 26</div><div class="specimen h2">Born in India. Wardrobe of the world.</div></div>
</body>
</html>
