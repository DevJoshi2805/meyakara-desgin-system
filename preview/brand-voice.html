<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Voice samples</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .block { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-mute); }
  .quote { font-family: var(--font-serif); font-style: italic; font-size: 22px; line-height: 1.25; color: var(--ink); max-width: 24ch; }
  .yes, .no { font-family: var(--font-serif); font-size: 14px; line-height: 1.5; padding: 8px 0; border-top: 1px solid var(--rule-soft); }
  .yes::before { content: "✓ "; color: var(--ink); margin-right: 4px; font-style: normal; }
  .no { color: var(--fg-faint); text-decoration: line-through; }
  .no::before { content: "✗ "; text-decoration: none; display: inline-block; margin-right: 4px; }
</style>
</head>
<body>
  <div class="block">
    <div class="label">In voice</div>
    <div class="quote">Everyone has a hill. This is yours.</div>
    <div class="yes">Find the shape.</div>
    <div class="yes">The city will wait. The hills won't.</div>
    <div class="yes">Wear your escape.</div>
  </div>
  <div class="block">
    <div class="label">Out of voice</div>
    <div class="no">Shop the new drop now! 🔥</div>
    <div class="no">Limited stock — don't miss out!</div>
    <div class="no">Our mission is to empower self-expression.</div>
    <div class="no">Hurry, sale ends tonight.</div>
  </div>
</body>
</html>
