<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Product card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .card { display: flex; flex-direction: column; gap: 10px; }
  .img { aspect-ratio: 4/5; background: linear-gradient(160deg, #C9B89A 0%, #B26B4A 100%); border: 1px solid var(--rule-soft); position: relative; }
  .img.alt { background: linear-gradient(160deg, #8FA0A8 0%, #2D332E 100%); }
  .stamp { position: absolute; top: 10px; left: 10px; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--paper); background: var(--ink); padding: 4px 8px; }
  .name { font-family: var(--font-serif); font-size: 16px; }
  .meta { font-size: 12px; color: var(--fg-mute); display: flex; justify-content: space-between; }
  .price { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
</style>
</head>
<body>
  <div class="card">
    <div class="img"><div class="stamp">LINO</div></div>
    <div class="name">The Slow Sunday Trouser</div>
    <div class="meta"><span>Italian linen · faded olive</span><span class="price">₹ 6,400</span></div>
  </div>
  <div class="card">
    <div class="img alt"><div class="stamp">DHUNDH</div></div>
    <div class="name">The 6am Ridge Shirt</div>
    <div class="meta"><span>Light cotton · pine</span><span class="price">₹ 4,800</span></div>
  </div>
</body>
</html>
