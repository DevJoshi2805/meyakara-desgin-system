<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .cell .swatch { width: 100%; height: 96px; display: flex; align-items: center; justify-content: center; }
  .wordmark { width: 88%; height: auto; }
  .label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-mute); }
  .note  { font-family: var(--font-serif); font-style: italic; font-size: 11px; color: var(--fg-mute); }
</style>
</head>
<body>
  <div class="cell">
    <div class="swatch"><img class="wordmark" src="../assets/logo-wordmark.svg" alt=""></div>
    <div class="label">Wordmark — primary</div>
    <div class="note">Default everywhere there is room.</div>
  </div>
  <div class="cell">
    <div class="swatch" style="background: var(--ink);"><img class="wordmark" src="../assets/logo-wordmark.svg" alt="" style="filter: invert(1);"></div>
    <div class="label">Wordmark — on ink</div>
    <div class="note">Same wordmark, inverted.</div>
  </div>
  <div class="cell">
    <div class="swatch" style="background: var(--paper-warm);"><img class="wordmark" src="../assets/logo-wordmark.svg" alt=""></div>
    <div class="label">Wordmark — on paper-warm</div>
    <div class="note">No second mark. The wordmark is the brand.</div>
  </div>
</body>
</html>
