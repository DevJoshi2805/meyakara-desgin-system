<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Radii & Hairlines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 28px; display: grid; grid-template-columns: repeat(5,1fr); gap: 18px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .demo { width: 88px; height: 88px; background: var(--paper-warm); border: 1px solid var(--ink); }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-mute); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="cell"><div class="demo" style="border-radius:0"></div><div class="label">Square</div><div class="hex">0 — default</div></div>
  <div class="cell"><div class="demo" style="border-radius:2px"></div><div class="label">Subtle</div><div class="hex">2px</div></div>
  <div class="cell"><div class="demo" style="border-radius:4px"></div><div class="label">Soft</div><div class="hex">4px</div></div>
  <div class="cell"><div class="demo" style="width:140px;height:42px;border-radius:999px"></div><div class="label">Pill</div><div class="hex">999px — rare</div></div>
  <div class="cell"><div class="demo" style="border-radius:50%"></div><div class="label">Circle</div><div class="hex">avatars only</div></div>
</body>
</html>
