<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; }
  .row { display: grid; grid-template-columns: 70px 56px 1fr; align-items: center; gap: 14px; padding: 7px 0; }
  .tag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mute); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); text-align: right; }
  .bar { height: 14px; background: var(--ink); }
</style>
</head>
<body>
  <div class="row"><div class="tag">s-1</div><div class="px">4 px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tag">s-2</div><div class="px">8 px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tag">s-3</div><div class="px">12 px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tag">s-4</div><div class="px">16 px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tag">s-5</div><div class="px">24 px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tag">s-6</div><div class="px">32 px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tag">s-7</div><div class="px">48 px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tag">s-8</div><div class="px">64 px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="tag">s-9</div><div class="px">96 px</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="tag">s-10</div><div class="px">128 px</div><div class="bar" style="width:128px"></div></div>
</body>
</html>
